    rel="stylesheet" />

  <style>
    /* ==================== 主题变量 · Claymorphism 扩展 ==================== */
    :root,
    .theme-festive {
      /* 原有主色（兼容 JS / 旧样式） */
      --primary-color: #e85d2f;
      --primary-border-color: #ffd6b8;
      --primary-bg-light: #fff3e8;
      --button-bg-color: #f97316;
      --button-bg-hover: #ea580c;
      --button-border-color: #f97316;
      --button-text-color: #9a3412;
      --link-hover-bg: #ffedd5;
      --primary-ring-color: #fb923c;

      /* Claymorphism 新增 */
      --clay-bg: #fff7ed;
      --clay-surface: #fff3e3;
      --clay-accent: #fb923c;
      --clay-accent-soft: #fed7aa;
      --clay-text: #9a3412;
      --clay-text-soft: #c2410c;
      --clay-cta: #2563eb;
      --clay-radius-sm: 14px;
      --clay-radius-md: 20px;
      --clay-radius-lg: 28px;
      --clay-shadow-out:
        8px 8px 20px rgba(234, 88, 12, 0.18),
        -6px -6px 16px rgba(255, 255, 255, 0.9);
      --clay-shadow-in:
        inset 4px 4px 10px rgba(234, 88, 12, 0.15),
        inset -4px -4px 10px rgba(255, 255, 255, 0.95);
      --clay-shadow-soft:
        4px 4px 12px rgba(234, 88, 12, 0.12),
        -3px -3px 10px rgba(255, 255, 255, 0.8);
    }

    .theme-solemn {
      --primary-color: #475569;
      --primary-border-color: #cbd5e1;
      --primary-bg-light: #f1f5f9;
      --button-bg-color: #64748b;
      --button-bg-hover: #475569;
      --button-border-color: #64748b;
      --button-text-color: #334155;
      --link-hover-bg: #e2e8f0;
      --primary-ring-color: #64748b;

      --clay-bg: #f8fafc;
      --clay-surface: #f1f5f9;
      --clay-accent: #94a3b8;
      --clay-accent-soft: #cbd5e1;
      --clay-text: #1e293b;
      --clay-text-soft: #475569;
      --clay-cta: #2563eb;
      --clay-shadow-out:
        8px 8px 20px rgba(71, 85, 105, 0.18),
        -6px -6px 16px rgba(255, 255, 255, 0.9);
      --clay-shadow-in:
        inset 4px 4px 10px rgba(71, 85, 105, 0.15),
        inset -4px -4px 10px rgba(255, 255, 255, 0.95);
      --clay-shadow-soft:
        4px 4px 12px rgba(71, 85, 105, 0.12),
        -3px -3px 10px rgba(255, 255, 255, 0.8);
    }

    body {
      font-family: "Fredoka", "Nunito", "KaiTi", "楷体", serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(1200px 600px at 15% 10%, #ffe8d1 0%, transparent 60%),
        radial-gradient(1000px 500px at 85% 90%, #ffd7b5 0%, transparent 55%),
        var(--clay-bg);
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ==================== 动态布局 ==================== */
    #layout-root {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    #qr-code-area {
      width: 28%;
      flex-shrink: 0;
      background: linear-gradient(155deg, var(--clay-surface) 0%, #ffe8d1 100%);
      border-right: none;
      box-sizing: border-box;
      display: none;
      /* 默认隐藏，由 JS 控制显示 */
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
      box-shadow:
        10px 0 30px rgba(234, 88, 12, 0.1),
        inset -4px 0 0 rgba(255, 255, 255, 0.5);
    }

    #layout-root.layout-right #qr-code-area {
      box-shadow:
        -10px 0 30px rgba(234, 88, 12, 0.1),
        inset 4px 0 0 rgba(255, 255, 255, 0.5);
    }

    #app-container {
      flex: 1;
      min-width: 0;
      height: 100%;
      position: relative;
    }

    /* ==================== 收款码区域样式 ==================== */
    .qr-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
      min-height: 0;
      margin-bottom: 1.5rem;
      flex: 1;
    }

    .vertical-text {
      writing-mode: vertical-lr;
      text-orientation: mixed;
      font-size: clamp(1.5rem, 2vw, 2rem);
      font-weight: bold;
      color: var(--primary-color);
      letter-spacing: 6px;
      flex-shrink: 0;
    }

    .qr-container img {
      max-width: 80%;
      max-height: 100%;
      height: auto;
      object-fit: contain;
      border-radius: var(--clay-radius-md);
      border: 4px solid #ffffff;
      padding: 8px;
      background: #ffffff;
      box-shadow: var(--clay-shadow-out);
    }

    .vertical-text {
      color: var(--clay-text);
      font-family: "Fredoka", "Nunito", "Microsoft YaHei", sans-serif;
    }

    .custom-text-area {
      width: 100%;
      overflow: hidden;
      padding: 1.25rem 1rem;
      margin-top: 1.25rem;
      border-top: none;
      background: rgba(255, 255, 255, 0.6);
      border-radius: var(--clay-radius-md);
      box-shadow: var(--clay-shadow-in);
      font-family: "Nunito", "Microsoft YaHei", sans-serif;
      writing-mode: horizontal-tb;
      line-height: 1.6;
      font-size: 1rem;
      color: var(--clay-text);
    }

    /* ==================== 礼簿框架 · Claymorphism ==================== */
    .gift-book-frame {
      border: none;
      padding: clamp(18px, 2.2vw, 36px);
      border-radius: var(--clay-radius-lg);
      background: linear-gradient(160deg, #ffffff 0%, var(--clay-surface) 100%);
      display: flex;
      flex-direction: column;
      height: calc(100vh - 24px);
      margin: 12px;
      width: calc(100% - 24px);
      box-sizing: border-box;
      box-shadow: var(--clay-shadow-out);
    }

    .gift-book-header {
      flex-shrink: 0;
      margin-bottom: clamp(10px, 1.5vh, 30px);
    }

    .gift-book-content {
      display: grid;
      grid-template-rows: 3fr 1fr 3fr;
      border-top: none;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      gap: 6px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: var(--clay-radius-md);
      box-shadow: var(--clay-shadow-in);
    }

    .gift-book-row {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      width: 100%;
      gap: 6px;
    }

    .book-cell {
      border: none;
      border-radius: var(--clay-radius-sm);
      background: linear-gradient(160deg, #ffffff 0%, #fff3e3 100%);
      box-shadow: var(--clay-shadow-soft);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-lr;
      text-orientation: mixed;
      font-weight: 600;
      font-size: clamp(14px, 1.8vw, 32px);
      letter-spacing: clamp(4px, 0.8vw, 10px);
      padding: clamp(5px, 1vh, 15px) 0;
      overflow: hidden;
      text-align: center;
      position: relative;
      min-height: 0;
    }

    .book-cell:first-child {
      border-left: none;
    }

    .name-cell .name {
      color: #333;
      padding: clamp(8px, 1.5vh, 20px) 0;
      text-align: center;
      white-space: nowrap;
      min-height: auto;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .latest-entry {
      animation: highlight-pulse 2s ease-in-out;
      background: linear-gradient(160deg, #fff8c7 0%, #ffe6a8 100%) !important;
      box-shadow:
        0 0 0 3px rgba(251, 191, 36, 0.4),
        var(--clay-shadow-soft) !important;
    }

    @keyframes highlight-pulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.4), var(--clay-shadow-soft);
      }

      50% {
        transform: scale(1.03);
        box-shadow: 0 0 0 6px rgba(251, 191, 36, 0.6), 0 10px 25px rgba(251, 146, 60, 0.35);
      }
    }

    .type-cell {
      color: #ffffff;
      background: linear-gradient(160deg, var(--primary-color) 0%, #c2410c 100%) !important;
      font-size: clamp(16px, 2vw, 28px);
      padding: clamp(8px, 1.5vh, 15px) 5px;
      font-family: "Source Han Serif CN Heavy", "Fredoka", serif;
      font-weight: 700;
      box-shadow:
        inset 2px 2px 6px rgba(0, 0, 0, 0.15),
        inset -2px -2px 6px rgba(255, 255, 255, 0.2),
        var(--clay-shadow-soft) !important;
    }

    .amount-cell {
      color: var(--clay-text);
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: clamp(5px, 1vw, 10px);
      justify-content: center;
      gap: clamp(5px, 1vh, 10px);
      padding: clamp(5px, 1vh, 10px) 0;
    }

    .name-cell .name {
      color: var(--clay-text) !important;
    }

    .amount-chinese {
      letter-spacing: clamp(1px, 0.3vw, 2px);
      text-align: center;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    .amount-numeric {
      color: #555;
      letter-spacing: 1px;
      writing-mode: lr;
      font-size: clamp(10px, 1.3vw, 18px);
      white-space: nowrap;
    }

    .amount-chinese.scale,
    .name.scale {
      font-size: clamp(12px, 1.5vw, 18px);
      letter-spacing: -1px;
      padding: clamp(3px, 0.5vh, 8px) 0;
    }

    .amount-numeric.scale {
      letter-spacing: 0.5px;
      font-size: clamp(9px, 1.2vw, 14px);
    }

    /* ==================== 顶部控件 · Claymorphism ==================== */
    #top-right-controls {
      position: absolute;
      top: 28px;
      right: 28px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #fullscreen-btn,
    #settings-btn {
      background: linear-gradient(160deg, #ffffff 0%, var(--clay-surface) 100%);
      border: none;
      cursor: pointer;
      padding: 12px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--clay-shadow-out);
    }

    #fullscreen-icon,
    #settings-icon {
      color: var(--primary-color);
      font-size: 22px !important;
    }

    #fullscreen-btn:hover,
    #settings-btn:hover {
      box-shadow: var(--clay-shadow-soft);
      transform: translateY(1px);
    }

    #fullscreen-btn:active,
    #settings-btn:active {
      box-shadow: var(--clay-shadow-in);
      transform: translateY(2px);
    }

    #fullscreen-btn:focus-visible,
    #settings-btn:focus-visible {
      outline: 3px solid var(--clay-accent);
      outline-offset: 3px;
    }

    /* ==================== 全屏提示 · Claymorphism ==================== */
    #fullscreen-hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(160deg, #ffffff 0%, var(--clay-surface) 100%);
      color: var(--clay-text);
      padding: 14px 32px;
      border-radius: 999px;
      font-family: "Fredoka", "Nunito", sans-serif;
      font-size: 15px;
      font-weight: 600;
      z-index: 1000;
      box-shadow: var(--clay-shadow-out);
      animation: fade-in-out 5s forwards;
    }

    @keyframes fade-in-out {

      0%,
      100% {
        opacity: 0;
      }

      10%,
      90% {
        opacity: 1;
      }
    }

    /* ==================== 弹窗样式 · Claymorphism ==================== */
    #modal-container {
      font-family: "Fredoka", "Nunito", "Microsoft YaHei", sans-serif;
      backdrop-filter: blur(6px);
      background-color: rgba(154, 52, 18, 0.35) !important;
    }

    #modal {
      display: flex;
      flex-direction: column;
      max-height: 90vh;
      max-width: 700px;
      width: 90vw;
      background: linear-gradient(160deg, #ffffff 0%, var(--clay-surface) 100%) !important;
      border-radius: var(--clay-radius-lg) !important;
      padding: 2rem !important;
      box-shadow:
        0 30px 60px rgba(234, 88, 12, 0.25),
        12px 12px 30px rgba(234, 88, 12, 0.15),
        -8px -8px 20px rgba(255, 255, 255, 0.95) !important;
    }

    #modal-title {
      color: var(--clay-text);
      font-family: "Fredoka", "Nunito", sans-serif;
      font-weight: 700;
    }

    #modal-content {
      flex: 1;
      overflow-y: auto;
      padding-right: 0.5rem;
      color: var(--clay-text);
    }

    #modal-content label {
      color: var(--clay-text) !important;
      font-weight: 600;
    }

    .themed-button-primary {
      background: linear-gradient(160deg, #fb923c 0%, var(--button-bg-color) 100%);
      color: #ffffff;
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      font-weight: 700;
      font-family: "Fredoka", "Nunito", sans-serif;
      box-shadow:
        6px 6px 14px rgba(234, 88, 12, 0.3),
        -3px -3px 10px rgba(255, 255, 255, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      cursor: pointer;
      border: none;
    }

    .themed-button-primary:hover {
      background: linear-gradient(160deg, var(--button-bg-color) 0%, var(--button-bg-hover) 100%);
      box-shadow:
        4px 4px 10px rgba(234, 88, 12, 0.25),
        -2px -2px 8px rgba(255, 255, 255, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transform: translateY(1px);
    }

    .themed-button-primary:active {
      transform: translateY(2px);
      box-shadow:
        inset 3px 3px 8px rgba(154, 52, 18, 0.3),
        inset -2px -2px 6px rgba(255, 255, 255, 0.2);
    }

    .themed-button-secondary {
      background: linear-gradient(160deg, #ffffff 0%, var(--clay-surface) 100%);
      border: none;
      color: var(--button-text-color);
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      font-weight: 700;
      font-family: "Fredoka", "Nunito", sans-serif;
      box-shadow: var(--clay-shadow-out);
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      cursor: pointer;
    }

    .themed-button-secondary:hover {
      box-shadow: var(--clay-shadow-soft);
      transform: translateY(1px);
    }

    .themed-button-secondary:active {
      box-shadow: var(--clay-shadow-in);
      transform: translateY(2px);
    }

    .themed-ring:focus {
      --tw-ring-color: var(--primary-ring-color) !important;
      box-shadow: 0 0 0 3px var(--tw-ring-color);
      outline: none;
    }

    .themed-text-radio {
      color: var(--button-text-color);
      accent-color: var(--clay-accent);
    }

    /* ==================== Pell.js · Claymorphism 适配 ==================== */
    #pell-editor-container {
      border-radius: var(--clay-radius-sm);
      overflow: hidden;
      box-shadow: var(--clay-shadow-in);
      background: #ffffff;
    }

    .pell-content {
      height: 120px;
      outline: 0;
      overflow-y: auto;
      padding: 12px 14px;
      font-family: "Nunito", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: #fff;
      color: var(--clay-text);
    }

    .pell-content:focus {
      outline: none;
      box-shadow: inset 0 0 0 2px var(--clay-accent);
    }

    .pell-actionbar {
      background: linear-gradient(160deg, var(--clay-surface) 0%, #ffe8d1 100%);
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border-bottom: 2px solid rgba(251, 146, 60, 0.2);
    }

    .pell-button {
      background: #ffffff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      height: 32px;
      min-width: 32px;
      margin: 0;
      padding: 4px 6px;
      vertical-align: middle;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--clay-text);
      box-shadow:
        2px 2px 5px rgba(234, 88, 12, 0.15),
        -1px -1px 4px rgba(255, 255, 255, 0.9);
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
    }

    .pell-button-selected {
      background: linear-gradient(160deg, var(--clay-accent-soft) 0%, #fdba74 100%);
      color: #ffffff;
      box-shadow:
        inset 2px 2px 4px rgba(154, 52, 18, 0.25),
        inset -1px -1px 3px rgba(255, 255, 255, 0.3);
    }

    .pell-button:hover {
      box-shadow:
        1px 1px 3px rgba(234, 88, 12, 0.12),
        -1px -1px 3px rgba(255, 255, 255, 0.8);
      transform: translateY(1px);
    }

    .pell-button [class*="ri-"] {
      font-size: 18px;
      line-height: 1;
      vertical-align: middle;
    }

    .custom-pell-select {
      font-size: 14px;
      border: none;
      background: #ffffff;
      border-radius: 10px;
      height: 32px;
      margin: 0;
      padding: 4px 8px;
      cursor: pointer;
      color: var(--clay-text);
      box-shadow:
        2px 2px 5px rgba(234, 88, 12, 0.15),
        -1px -1px 4px rgba(255, 255, 255, 0.9);
    }

    .custom-pell-color {
      padding: 0 2px;
      width: 40px;
      height: 32px;
      margin: 0;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ffffff;
      box-shadow:
        2px 2px 5px rgba(234, 88, 12, 0.15),
        -1px -1px 4px rgba(255, 255, 255, 0.9);
    }

    /* ==================== 标题 · 胖胖手写风 ==================== */
    #event-title {
      font-family: "Fredoka", "Source Han Serif CN Heavy", "KaiTi", serif !important;
      font-weight: 700 !important;
      letter-spacing: 0.2em !important;
      background: linear-gradient(160deg, var(--primary-color) 0%, #c2410c 50%, var(--primary-color) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 4px 12px rgba(234, 88, 12, 0.25),
        0 1px 0 rgba(255, 255, 255, 0.4);
      padding: 6px 0;
    }

    /* ==================== 滚动条 · 粘土风 ==================== */
    #modal-content::-webkit-scrollbar,
    .pell-content::-webkit-scrollbar {
      width: 8px;
    }

    #modal-content::-webkit-scrollbar-track,
    .pell-content::-webkit-scrollbar-track {
      background: transparent;
    }

    #modal-content::-webkit-scrollbar-thumb,
    .pell-content::-webkit-scrollbar-thumb {
      background: var(--clay-accent-soft);
      border-radius: 999px;
    }

    #modal-content::-webkit-scrollbar-thumb:hover,
    .pell-content::-webkit-scrollbar-thumb:hover {
      background: var(--clay-accent);
    }

    /* ==================== 文件上传 · 粘土风 ==================== */
    #modal-content input[type="file"]::file-selector-button {
      background: linear-gradient(160deg, #ffffff 0%, var(--clay-surface) 100%);
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-family: "Fredoka", "Nunito", sans-serif;
      font-weight: 700;
      color: var(--clay-text);
      cursor: pointer;
      box-shadow: var(--clay-shadow-soft);
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      margin-right: 12px;
    }

    #modal-content input[type="file"]::file-selector-button:hover {
      transform: translateY(1px);
      box-shadow: var(--clay-shadow-in);
    }

    #modal-content img[id$="-preview"] {
      border-radius: var(--clay-radius-sm) !important;
      border: none !important;
      box-shadow: var(--clay-shadow-soft);
      padding: 6px !important;
      background: #ffffff;
    }
  </style>
</head>

<body class="theme-festive">
  <div id="layout-root" class="flex flex-row w-screen h-screen">
    <div id="qr-code-area">
      <div class="flex flex-col flex-1 min-h-0">
        <div id="alipay-qr-container" class="qr-container" style="display: none">
          <p class="vertical-text">支付宝</p>
          <img id="qr-alipay-img" src="" alt="Alipay" />
        </div>
        <div id="wechat-qr-container" class="qr-container" style="display: none">
          <p class="vertical-text">微信</p>
          <img id="qr-wechat-img" src="" alt="WeChat Pay" />
        </div>
      </div>
      <div id="custom-text-display" class="custom-text-area"></div>
    </div>

    <div id="app-container" class="flex-1 hidden h-full">
      <div class="gift-book-frame">
        <div class="mb-6 text-center">
          <h1 id="event-title" class="text-4xl font-bold" style="color: var(--primary-color); letter-spacing: 8px">礼簿
          </h1>
        </div>
        <div id="gift-book-content" class="gift-book-content"></div>
      </div>

      <div id="top-right-controls">
        <button id="settings-btn" title="设置">
          <i id="settings-icon" class="ri-settings-3-line text-2xl"></i>
        </button>
        <button id="fullscreen-btn" title="全屏/退出全屏">
          <i id="fullscreen-icon" class="ri-fullscreen-line text-2xl"></i>
        </button>
      </div>
    </div>
  </div>


  <div id="fullscreen-hint">按 F11 进入全屏以获得最佳效果</div>

  <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black bg-opacity-50">
    <div id="modal" class="p-6 bg-white rounded-lg shadow-xl">
      <h3 id="modal-title" class="mb-4 text-xl font-bold text-center"></h3>
      <div id="modal-content"></div>
      <div id="modal-actions" class="flex justify-end mt-6 space-x-3"></div>
    </div>
  </div>

  <script src="./static/libs/pell.min.js"></script>

  <script>
    /**
     * 简易缓存管理器
     */
    const CacheManager = {
      CACHE_NAME: "guest-screen-qr-cache",
      SETTINGS_KEY: "guest-screen-settings",

      async storeImage(key, file) {
        try {
          const cache = await caches.open(this.CACHE_NAME);
          const response = new Response(file);
          await cache.put(key, response);
          console.log(`Image ${key} stored in cache.`);
        } catch (error) {
          console.error(`Failed to store image ${key}:`, error);
        }
      },

      async getImage(key) {
        try {
          const cache = await caches.open(this.CACHE_NAME);
          const response = await cache.match(key);
          if (response) {
            return response.blob();
          }
          return null;
        } catch (error) {
          console.error(`Failed to get image ${key}:`, error);
          return null;
        }
      },

      // 新增: 删除图片缓存
      async deleteImage(key) {
        try {
          const cache = await caches.open(this.CACHE_NAME);
          await cache.delete(key);
          console.log(`Image ${key} deleted from cache.`);
        } catch (error) {
          console.error(`Failed to delete image ${key}:`, error);
        }
      },

      storeSettings(settings) {
        try {
          const currentSettings = this.getSettings();
          const newSettings = { ...currentSettings, ...settings };
          localStorage.setItem(this.SETTINGS_KEY, JSON.stringify(newSettings));
        } catch (error) {
          console.error("Failed to store settings:", error);
        }
      },

      getSettings() {
        try {
          const settings = localStorage.getItem(this.SETTINGS_KEY);
          const defaults = { layout: "hidden", customText: "" };
          return settings ? { ...defaults, ...JSON.parse(settings) } : defaults;
        } catch (error) {
          console.error("Failed to get settings:", error);
          return { layout: "hidden", customText: "" };
        }
      },
    };

    // 工具函数：隐藏姓名
    function maskName(name, hidePrivacy, isLatest) {
      if (!hidePrivacy || isLatest) {
        return name;
      }
      const nameLength = name.length;
      if (nameLength <= 1) return name;
      if (nameLength === 2) return name[0] + "**";
      if (nameLength === 3) return name[0] + "**";
      return name.substring(0, 2) + "**";
    }

    // 副屏状态管理
    class GuestScreen {
      constructor() {
        this.currentData = null;
        this.cacheDOMElements();
      }

      cacheDOMElements() {
        const $ = (id) => document.getElementById(id);
        this.appContainer = $("app-container");
        this.eventTitle = $("event-title");
        this.giftBookContent = $("gift-book-content");
        this.fullscreenBtn = $("fullscreen-btn");
        this.fullscreenIcon = $("fullscreen-icon");
        this.fullscreenHint = $("fullscreen-hint");

        this.layoutRoot = $("layout-root");
        this.qrCodeArea = $("qr-code-area");
        this.qrAlipayContainer = $("alipay-qr-container");
        this.qrWechatContainer = $("wechat-qr-container");
        this.qrAlipayImg = $("qr-alipay-img");
        this.qrWechatImg = $("qr-wechat-img");
        this.customTextDisplay = $("custom-text-display");

        this.settingsBtn = $("settings-btn");
        this.modalContainer = $("modal-container");
        this.modal = $("modal");
        this.modalTitle = $("modal-title");
        this.modalContent = $("modal-content");
        this.modalActions = $("modal-actions");

        this.pendingAlipayFile = null;
        this.pendingWechatFile = null;
        // 新增: 标记是否清空
        this.alipayCleared = false;
        this.wechatCleared = false;
      }

      init() {
        window.addEventListener("message", (e) => this.handleMessage(e));
        window.opener?.postMessage({ type: "guest_screen_ready" }, "*");
        this.bindControlEvents();
        this.loadAndApplySettings();
      }

      bindControlEvents() {
        document.addEventListener("fullscreenchange", () => {
          if (document.fullscreenElement) {
            this.fullscreenHint.style.display = "none";
            this.fullscreenIcon.className = "ri-fullscreen-exit-line text-2xl";
          } else {
            this.fullscreenIcon.className = "ri-fullscreen-line text-2xl";
          }
        });

        this.fullscreenBtn.addEventListener("click", () => {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch((err) => {
              console.error(`Error attempting to enable full-screen mode: ${err.message}`);
            });
          } else {
            document.exitFullscreen();
          }
        });

        this.settingsBtn.addEventListener("click", () => this.showSettingsModal());
      }

      handleMessage(event) {
        const { type, data } = event.data || {};
        switch (type) {
          case "guest_screen_update":
            this.updateDisplay(data);
            break;
          case "guest_screen_heartbeat":
            break;
        }
      }

      updateDisplay(data) {
        if (!data) return;
        this.currentData = data;
        document.body.className = data.theme || "theme-festive";
        this.eventTitle.textContent = data.eventName || "礼簿";
        this.renderGiftBook(data);
        this.appContainer.classList.remove("hidden");
      }

      renderGiftBook(data) {
        const { gifts, hidePrivacy, typeText } = data;
        const ITEMS_PER_PAGE = 12;
        const latestGiftId = gifts[gifts.length - 1]?.id;
        const displayGifts = [...gifts];
        while (displayGifts.length < ITEMS_PER_PAGE) {
          displayGifts.push(null);
        }
        const nameRow = document.createElement("div");
        nameRow.className = "gift-book-row";
        const typeRow = document.createElement("div");
        typeRow.className = "gift-book-row";
        const amountRow = document.createElement("div");
        amountRow.className = "gift-book-row";
        displayGifts.forEach((gift) => {
          const nameCell = document.createElement("div");
          nameCell.className = "book-cell name-cell";
          if (gift) {
            const isLatest = gift.id === latestGiftId;
            const displayName = maskName(gift.name, hidePrivacy, isLatest);
            const formattedName = displayName.length === 2 ? `${displayName[0]}\u3000${displayName[1]}` : displayName;
            nameCell.innerHTML = `<div class="name ${displayName.length > 4 ? "scale" : ""}">${formattedName}</div>`;
            if (isLatest) nameCell.classList.add("latest-entry");
          }
          nameRow.appendChild(nameCell);
          const typeCell = document.createElement("div");
          typeCell.className = "book-cell type-cell";
          typeCell.textContent = typeText || "贺礼";
          typeRow.appendChild(typeCell);
          const amountCell = document.createElement("div");
          amountCell.className = "book-cell amount-cell";
          if (gift) {
            const amountChinese = gift.amountChinese;
            amountCell.innerHTML = `
                <div class="amount-chinese ${amountChinese.length > 16 ? "scale" : ""}">${amountChinese}</div>
                <div class="amount-numeric ${Math.abs(gift.amount).toString().length > 8 ? "scale" : ""}">￥${gift.amount}</div>
              `;
            if (gift.id === latestGiftId) amountCell.classList.add("latest-entry");
          }
          amountRow.appendChild(amountCell);
        });
        this.giftBookContent.innerHTML = "";
        this.giftBookContent.append(nameRow, typeRow, amountRow);
      }

      async loadAndApplySettings() {
        const settings = CacheManager.getSettings();
        const alipayBlob = await CacheManager.getImage("alipay-qr");
        const wechatBlob = await CacheManager.getImage("wechat-qr");
        const customText = settings.customText || "";

        const hasContent = !!alipayBlob || !!wechatBlob || (customText && customText.trim() !== "");
        this.applyLayout(settings.layout, hasContent);

        if (alipayBlob) {
          this.qrAlipayImg.src = URL.createObjectURL(alipayBlob);
          this.qrAlipayContainer.style.display = "flex";
        } else {
          this.qrAlipayImg.src = "";
          this.qrAlipayContainer.style.display = "none";
        }
        if (wechatBlob) {
          this.qrWechatImg.src = URL.createObjectURL(wechatBlob);
          this.qrWechatContainer.style.display = "flex";
        } else {
          this.qrWechatImg.src = "";
          this.qrWechatContainer.style.display = "none";
        }
        this.customTextDisplay.innerHTML = customText;
      }

      applyLayout(layout, hasContent) {
        this.layoutRoot.classList.remove("flex-row", "flex-row-reverse");
        const showQrArea = layout !== "hidden" && hasContent;
        if (showQrArea) {
          this.qrCodeArea.style.display = "flex";
          if (layout === "left") this.layoutRoot.classList.add("flex-row");
          else if (layout === "right") this.layoutRoot.classList.add("flex-row-reverse");
        } else {
          this.qrCodeArea.style.display = "none";
        }
      }

      async showSettingsModal() {
        this.pendingAlipayFile = null;
        this.pendingWechatFile = null;
        this.alipayCleared = false; // 重置状态
        this.wechatCleared = false; // 重置状态

        const settings = CacheManager.getSettings();
        const currentLayout = settings.layout || "hidden";
        const customText = settings.customText || "";

        const alipayBlob = await CacheManager.getImage("alipay-qr");
        const wechatBlob = await CacheManager.getImage("wechat-qr");
        const alipaySrc = alipayBlob ? URL.createObjectURL(alipayBlob) : "";
        const wechatSrc = wechatBlob ? URL.createObjectURL(wechatBlob) : "";

        this.modalTitle.textContent = "副屏显示设置";
        this.modalContent.innerHTML = `
            <div class="space-y-6 text-left">
              <div>
                <label class="block text-sm font-medium text-gray-700">显示收款码</label>
                <div class="flex mt-2 space-x-4">
                  <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" name="layout-position" value="hidden" class="themed-text-radio themed-ring" ${currentLayout === "hidden" ? "checked" : ""}>
                    <span>不显示</span>
                  </label>
                  <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" name="layout-position" value="left" class="themed-text-radio themed-ring" ${currentLayout === "left" ? "checked" : ""}>
                    <span>左侧显示</span>
                  </label>
                  <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" name="layout-position" value="right" class="themed-text-radio themed-ring" ${currentLayout === "right" ? "checked" : ""}>
                    <span>右侧显示</span>
                  </label>
                </div>
              </div>

              <div class="sm:flex-row sm:space-y-0 sm:space-x-4 flex flex-col space-y-4">
                <div class="flex-1">
                  <div class="flex items-center justify-between mb-1">
                    <label class="block text-sm font-medium text-gray-700">支付宝 收款码</label>
                    <button id="alipay-clear-btn" class="text-xs text-red-600 hover:underline ${alipaySrc ? "" : "hidden"}">清空</button>
                  </div>
                  <input type="file" id="alipay-upload" accept="image/*" class="file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300 w-full text-sm text-gray-500">
                  <img id="alipay-preview" src="${alipaySrc}" class="mt-2 rounded-lg ${alipaySrc ? "" : "hidden"} max-w-full h-auto max-h-32 object-contain border p-1 bg-white">
                </div>
                <div class="flex-1">
                  <div class="flex items-center justify-between mb-1">
                    <label class="block text-sm font-medium text-gray-700">微信 收款码</label>
                    <button id="wechat-clear-btn" class="text-xs text-red-600 hover:underline ${wechatSrc ? "" : "hidden"}">清空</button>
                  </div>
                  <input type="file" id="wechat-upload" accept="image/*" class="file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300 w-full text-sm text-gray-500">
                  <img id="wechat-preview" src="${wechatSrc}" class="mt-2 rounded-lg ${wechatSrc ? "" : "hidden"} max-w-full h-auto max-h-32 object-contain border p-1 bg-white">
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700">自定义文字</label>
                <div id="pell-editor-container" class="mt-1"></div>
              </div>
            </div>
          `;

        this.modalActions.innerHTML = `
            <button id="modal-cancel-btn" class="themed-button-secondary">取消</button>
            <button id="modal-save-btn" class="themed-button-primary">保存设置</button>
          `;

        if (!window.pell) {
          console.error("Pell.js 未加载!");
          return;
        }

        const editor = window.pell.init({
          element: document.getElementById("pell-editor-container"),
          onChange: () => { },
          defaultParagraphSeparator: "div",
          styleWithCSS: false,
          actions: [
            { icon: '<i class="ri-bold" title="加粗"></i>', title: "Bold", result: () => window.pell.exec("bold") },
            { icon: '<i class="ri-italic" title="斜体"></i>', title: "Italic", result: () => window.pell.exec("italic") },
            { icon: '<i class="ri-underline" title="下划线"></i>', title: "Underline", result: () => window.pell.exec("underline") },
          ],
        });
        editor.content.innerHTML = customText;

        const actionbar = document.getElementById("pell-editor-container").querySelector(".pell-actionbar");
        const select = document.createElement("select");
        select.className = "custom-pell-select";
        select.title = "字号";
        select.innerHTML = `<option value="1">小</option><option value="3" selected>中</option><option value="5">大</option><option value="7">特大</option>`;
        select.onchange = () => {
          window.pell.exec("fontSize", select.value);
          editor.content.focus();
        };
        actionbar.appendChild(select);
        const colorInput = document.createElement("input");
        colorInput.type = "color";
        colorInput.className = "custom-pell-color";
        colorInput.title = "文字颜色";
        colorInput.value = "var(--primary-color)";
        colorInput.onchange = () => {
          window.pell.exec("foreColor", colorInput.value);
          editor.content.focus();
        };
        actionbar.appendChild(colorInput);
        const updateToolbarState = () => {
          const size = document.queryCommandValue("fontSize") || "3";
          if (select.value !== size) select.value = size;
        };
        editor.content.addEventListener("keyup", updateToolbarState);
        editor.content.addEventListener("mouseup", updateToolbarState);

        document.getElementById("modal-cancel-btn").onclick = () => this.closeSettingsModal();
        document.getElementById("modal-save-btn").onclick = () => this.handleSaveSettings(editor);
        document.getElementById("alipay-upload").onchange = (e) => this.handleFilePreview(e, "alipay");
        document.getElementById("wechat-upload").onchange = (e) => this.handleFilePreview(e, "wechat");
        document.getElementById("alipay-clear-btn").onclick = () => this.handleClearPreview("alipay");
        document.getElementById("wechat-clear-btn").onclick = () => this.handleClearPreview("wechat");

        this.modalContainer.classList.remove("hidden");
      }

      handleClearPreview(type) {
        const preview = document.getElementById(`${type}-preview`);
        const uploadInput = document.getElementById(`${type}-upload`);
        const clearBtn = document.getElementById(`${type}-clear-btn`);

        preview.src = "";
        preview.classList.add("hidden");
        uploadInput.value = "";
        clearBtn.classList.add("hidden");

        if (type === "alipay") {
          this.pendingAlipayFile = null;
          this.alipayCleared = true;
        } else if (type === "wechat") {
          this.pendingWechatFile = null;
          this.wechatCleared = true;
        }
      }

      closeSettingsModal() {
        this.modalContainer.classList.add("hidden");
        this.modalContent.innerHTML = "";
        this.modalActions.innerHTML = "";
      }

      handleFilePreview(event, type) {
        const file = event.target.files[0];
        if (!file) return;

        if (type === "alipay") {
          this.pendingAlipayFile = file;
          this.alipayCleared = false;
        }
        if (type === "wechat") {
          this.pendingWechatFile = file;
          this.wechatCleared = false;
        }

        const preview = document.getElementById(`${type}-preview`);
        const clearBtn = document.getElementById(`${type}-clear-btn`);
        const oldSrc = preview.src;
        preview.src = URL.createObjectURL(file);
        preview.classList.remove("hidden");
        clearBtn.classList.remove("hidden");

        preview.onload = () => {
          if (oldSrc.startsWith("blob:")) {
            URL.revokeObjectURL(oldSrc);
          }
        };
      }

      async handleSaveSettings(editor) {
        try {
          // 1. 根据标记和新文件更新图片
          if (this.alipayCleared) {
            await CacheManager.deleteImage("alipay-qr");
          } else if (this.pendingAlipayFile) {
            await CacheManager.storeImage("alipay-qr", this.pendingAlipayFile);
          }

          if (this.wechatCleared) {
            await CacheManager.deleteImage("wechat-qr");
          } else if (this.pendingWechatFile) {
            await CacheManager.storeImage("wechat-qr", this.pendingWechatFile);
          }

          // 2. 保存布局和文字
          const layout = document.querySelector('input[name="layout-position"]:checked').value;
          const customText = editor.content.innerHTML;
          CacheManager.storeSettings({ layout, customText });

          // 3. 重新加载并应用
          await this.loadAndApplySettings();

          // 4. 关闭弹窗
          this.closeSettingsModal();
        } catch (error) {
          console.error("保存设置失败:", error);
          alert("保存设置失败，请重试。");
        }
      }
    }

    const guestScreen = new GuestScreen();
    guestScreen.init();

    document.addEventListener("keydown", (e) => {
      if (e.target.closest(".pell-content")) return;
      if (e.key === "F11") {
        e.preventDefault();
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch((err) => {
            console.error(`Error attempting to enable full-screen mode: ${err.message}`);
          });
        } else {
          document.exitFullscreen();
        }
      }
      if (e.key === "Escape" && !document.fullscreenElement) {
        if (confirm("确定要关闭副屏吗？")) {
          window.close();
        }
      }
    });
  </script>
</body>

</html>
